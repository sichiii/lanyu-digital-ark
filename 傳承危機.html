<!-- RISK CHART -->
<div class="risk-section" id="risk">
  <div class="risk-inner">
    <p class="story-label">傳承危機量表 · Heritage Risk Index</p>
    <h2 style="font-family:'Noto Serif TC',serif;font-size:clamp(1.4rem,2.8vw,2rem);font-weight:600;color:var(--text-dark);letter-spacing:0.04em;margin-bottom:0.3rem;">知識斷層的緊迫程度</h2>
    <p style="font-size:0.8rem;color:var(--text-light);margin-bottom:2rem;letter-spacing:0.04em;">懸停各長條可查看危機說明；點擊可跳至對應展品</p>

    <div class="risk-legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--crisis-urgent);"></div>緊急（P1）</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--crisis-high);"></div>高（P2）</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--crisis-midhigh);"></div>中高（P3）</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--crisis-mid);"></div>中（P4）</div>
    </div>

    <div class="risk-bars" id="riskBars">

      <div class="risk-row" onclick="scrollToCard(1)" title="跳至拼板舟展品">
        <div class="risk-label">拼板舟<em>tatala</em></div>
        <div class="risk-track">
          <div class="risk-fill" data-width="95" style="background:var(--crisis-urgent);">
            <div class="risk-tooltip">師傅老齡化，技術斷層風險極高；現存造舟師約3人</div>
          </div>
        </div>
        <div class="risk-pct urgent">緊急 P1</div>
      </div>

      <div class="risk-row" onclick="scrollToCard(3)" title="跳至芋頭展品">
        <div class="risk-label">芋頭農耕<em>soli</em></div>
        <div class="risk-track">
          <div class="risk-fill" data-width="92" style="background:var(--crisis-urgent);">
            <div class="risk-tooltip">品種名稱知識人不足10人；氣候變遷加速品種滅失</div>
          </div>
        </div>
        <div class="risk-pct urgent">緊急 P1</div>
      </div>

      <div class="risk-row" onclick="scrollToCard(2)" title="跳至飛魚季展品">
        <div class="risk-label">飛魚季儀式<em>alibangbang</em></div>
        <div class="risk-track">
          <div class="risk-fill" data-width="78" style="background:var(--crisis-high);">
            <div class="risk-tooltip">完整祭詞傳承者減少；觀光化影響儀式完整性</div>
          </div>
        </div>
        <div class="risk-pct high">高 P2</div>
      </div>

      <div class="risk-row" onclick="scrollToCard(4)" title="跳至地下屋展品">
        <div class="risk-label">傳統地下屋<em>vahay</em></div>
        <div class="risk-track">
          <div class="risk-fill" data-width="62" style="background:var(--crisis-midhigh);">
            <div class="risk-tooltip">現代建材替代傳統工法；傳統工匠不足5人</div>
          </div>
        </div>
        <div class="risk-pct midhigh">中高 P3</div>
      </div>

      <div class="risk-row" onclick="scrollToCard(5)" title="跳至傳統服飾展品">
        <div class="risk-label">傳統服飾<em>walis / nagol</em></div>
        <div class="risk-track">
          <div class="risk-fill" data-width="45" style="background:var(--crisis-mid);">
            <div class="risk-tooltip">文化復振運動推動下有部分復甦；紡織技術仍稀少</div>
          </div>
        </div>
        <div class="risk-pct mid">中 P4</div>
      </div>

    </div>
  </div>
</div>
